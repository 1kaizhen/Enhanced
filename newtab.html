<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="vendor/phosphor/regular.css" />
  <link rel="stylesheet" href="vendor/phosphor/duotone.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="bg" id="bg"></div>
    <div class="bg-vignette"></div>

    <!-- TOP-RIGHT pills (Notes + To-do) -->
    <div class="topbar" id="topbar">
      <button class="pill" type="button" id="notes-pill" title="Notes (⌘N)">
        <svg class="i" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h10l4 4v12H5z"/><path d="M15 4v4h4"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>
        <span>Notes</span>
        <span class="pill-count" id="notes-count" hidden>0</span>
      </button>
      <button class="pill" type="button" id="todo-pill" title="To-do (⌘T)">
        <svg class="i" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 10 18 20 6"/></svg>
        <span>To-do</span>
        <span class="pill-count" id="todo-count" hidden>0</span>
      </button>
      <div class="home-todos" id="home-todos"></div>
    </div>

    <!-- (left-status removed: temperature, brand chip, and media pill all hidden for now) -->

    <!-- CENTER STACK -->
    <div class="center-stack">
      <!-- HERO -->
      <div class="hero">
        <div class="hero-eyebrow">
          <span id="greeting"></span>
          <span class="eyebrow-dot">•</span>
          <span id="today-date"></span>
        </div>
        <div class="clock" id="clock"></div>
        <div class="quote" id="quote" hidden>
          <p id="quote-text"></p>
          <span id="quote-author"></span>
        </div>
      </div>

      <!-- SEARCH -->
      <form class="search" id="search-form" autocomplete="off">
        <button type="button" class="search-engine" id="search-engine-btn" title="Choose engine">
          <span class="engine-glyph" id="search-engine-icon"></span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          <div class="engine-menu hidden" id="engine-menu" role="menu"></div>
        </button>
        <input type="text" id="search-input" placeholder="Search the web, or type a URL" autocomplete="off" />
        <button type="submit" class="search-go" title="Search" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        </button>
      </form>

      <!-- BOOKMARKS DOCK -->
      <div class="dock-wrap">
        <div class="dock-header">
          <span class="dock-title">Bookmarks</span>
          <span class="dock-divider"></span>
          <div class="add-cta-group" id="add-cta-group">
            <button type="button" class="dock-add-link" id="add-bookmark-btn">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span>Add bookmark</span>
            </button>
            <button type="button" class="dock-add-caret" id="add-caret-btn" aria-label="More options">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
            </button>
          </div>
        </div>
        <div class="dock" id="bookmarks-row"></div>
      </div>
    </div>

    <!-- BOTTOM-LEFT (settings + shortcut hints) -->
    <div class="bottom-left">
      <button class="cog" id="settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <!-- Floating pinned notes layer (sticky notes on wallpaper) -->
    <div class="pinned-notes-layer" id="pinned-notes-layer"></div>

    <!-- Host for panels / sheets injected by app.js -->
    <div id="panel-host"></div>

    <!-- Hidden inputs used by Settings sheet -->
    <input type="file" id="wallpaper-file" accept=".jpg,.jpeg,.png,.webp,.mp4,image/jpeg,image/png,image/webp,video/mp4" hidden />
    <input type="file" id="import-file" accept=".json,application/json" hidden />
  </div>

  <script src="app.js"></script>
</body>
</html>
