<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Folio · Search bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="../shared.css">
<style>
  .search-wrap {
    width: min(560px, 100%);
    position: relative;
  }
  .search-bar {
    display: flex; align-items: center; gap: 4px;
    padding: 7px 8px;
    background: linear-gradient(to right, rgba(0,0,0,0.51), rgba(0,0,0,0.14));
    backdrop-filter: blur(2.5px);
    -webkit-backdrop-filter: blur(2.5px);
    border: 1px solid rgba(227,227,227,0.5);
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  }
  .search-engine {
    display: flex; align-items: center; gap: 4px;
    background: transparent; border: none; color: var(--text);
    padding: 10px 8px 10px 12px; border-radius: 10px;
    cursor: pointer; font-family: inherit;
    transition: background .15s;
  }
  .search-engine:hover { background: rgba(255,255,255,0.08); }
  .search-engine .label { font-size: 13px; font-weight: 600; }
  .search-engine .caret { color: var(--text-faint); font-size: 12px; }

  .search-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: rgba(255,255,255,0.92);
    font-size: 14px; font-weight: 600; font-family: inherit;
    padding: 12px 4px;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.45); font-weight: 600; }

  .search-go {
    background: rgba(255,255,255,0.92); color: #111;
    border: none;
    width: 38px; height: 38px;
    border-radius: 10px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .search-go:hover { background: #fff; }

  .engine-menu {
    margin-top: 8px;
    background: rgba(20,20,26,0.90);
    backdrop-filter: blur(28px);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 6px;
    min-width: 200px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.4);
  }
  .engine-option {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 8px 10px;
    background: transparent; border: none;
    color: var(--text);
    font-size: 12.5px; font-family: inherit;
    border-radius: 8px;
    cursor: pointer; text-align: left;
    transition: background .15s;
  }
  .engine-option:hover { background: rgba(255,255,255,0.08); }
  .engine-option.active { background: rgba(255,255,255,0.10); }
</style>
</head>
<body>
  <div class="page">
    <div class="ds-eyebrow">Components</div>
    <h1 class="ds-title">Search bar</h1>
    <p class="ds-sub">Sits below the clock. The engine picker on the left swaps between Google / DuckDuckGo / Bing / etc. The go button is the only bright element in the composition — it pulls the eye forward.</p>

    <div class="section">
      <div class="sec-title">Default</div>
      <div class="search-wrap">
        <div class="search-bar">
          <button class="search-engine">
            <i class="ph ph-magnifying-glass"></i>
            <span class="label">Google</span>
            <i class="ph ph-caret-down caret"></i>
          </button>
          <input class="search-input" placeholder="Search the web…">
          <button class="search-go"><i class="ph ph-arrow-right" style="font-size: 16px;"></i></button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">With engine menu open</div>
      <div class="search-wrap">
        <div class="search-bar">
          <button class="search-engine">
            <i class="ph ph-magnifying-glass"></i>
            <span class="label">Google</span>
            <i class="ph ph-caret-down caret"></i>
          </button>
          <input class="search-input" placeholder="Search the web…">
          <button class="search-go"><i class="ph ph-arrow-right" style="font-size: 16px;"></i></button>
        </div>
        <div class="engine-menu">
          <button class="engine-option active"><i class="ph ph-magnifying-glass"></i> Google</button>
          <button class="engine-option"><i class="ph ph-shield"></i> DuckDuckGo</button>
          <button class="engine-option"><i class="ph ph-magnifying-glass"></i> Bing</button>
          <button class="engine-option"><i class="ph ph-magnifying-glass"></i> Brave</button>
          <button class="engine-option"><i class="ph ph-youtube-logo"></i> YouTube</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
