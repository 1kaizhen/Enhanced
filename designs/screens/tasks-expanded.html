<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Folio · Tasks pane expanded</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="screen-base.css">
</head>
<body>
  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <!-- Notes pane collapsed -->
  <aside class="notes-pane">
    <div class="notes-head">
      <button class="notes-collapse-btn">
        <span class="notes-title">Note</span>
        <i class="ph ph-caret-down" style="font-size: 11px;"></i>
      </button>
    </div>
  </aside>

  <!-- Tasks pane EXPANDED — glass appears -->
  <aside class="todo-pane expanded">
    <div class="todo-head">
      <button class="todo-collapse-btn">
        <span class="todo-title">tasks</span>
        <i class="ph ph-caret-up" style="font-size: 11px;"></i>
      </button>
      <button class="add-task-fab"><i class="ph ph-plus"></i> Task</button>
    </div>

    <div class="filter-tabs">
      <button class="tab active">All</button>
      <button class="tab">Active</button>
      <button class="tab">Done</button>
    </div>
    <div class="todo-count">3 active · 2 done</div>

    <div class="items-list">

      <div class="todo-card timing">
        <span class="priority-dot high"></span>
        <div class="todo-check"></div>
        <div class="todo-body">
          <div class="todo-text">Ship Folio v1.1 changelog.</div>
          <div class="timer-row">
            <span class="timer-display">24:13</span>
          </div>
        </div>
      </div>

      <div class="todo-card">
        <span class="priority-dot medium"></span>
        <div class="todo-check"></div>
        <div class="todo-body">
          <div class="todo-text">Review the PR from Sara.</div>
        </div>
      </div>

      <div class="todo-card">
        <span class="priority-dot low"></span>
        <div class="todo-check"></div>
        <div class="todo-body">
          <div class="todo-text">Buy groceries — basil, lemons.</div>
        </div>
      </div>

      <div class="todo-card done">
        <span class="priority-dot low"></span>
        <div class="todo-check">
          <svg viewBox="0 0 8 8" fill="none"><path d="M1.5 4l1.5 1.5L6.5 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="todo-body">
          <div class="todo-text">Update README.</div>
        </div>
      </div>

      <div class="todo-card done">
        <span class="priority-dot medium"></span>
        <div class="todo-check">
          <svg viewBox="0 0 8 8" fill="none"><path d="M1.5 4l1.5 1.5L6.5 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="todo-body">
          <div class="todo-text">Push the auth fix.</div>
        </div>
      </div>

    </div>

    <button class="clear-done">Clear completed</button>
  </aside>

  <button class="settings-fab" title="Settings"><i class="ph ph-gear-six"></i></button>

  <div class="center-stage">
    <div class="greeting">Good afternoon</div>
    <div class="clock">14:32</div>
    <div class="search-wrap">
      <form class="search-bar">
        <button type="button" class="search-engine">
          <i class="ph ph-magnifying-glass" style="font-size: 16px;"></i>
          <i class="ph ph-caret-down caret"></i>
        </button>
        <input class="search-input" placeholder="Search the web…">
        <button type="submit" class="search-go"><i class="ph ph-magnifying-glass" style="font-size: 14px;"></i></button>
      </form>
    </div>
  </div>

  <nav class="dock">
    <div class="dock-tile tint-gold"><div class="dock-tile-inner"><i class="ph ph-briefcase"></i></div></div>
    <div class="dock-tile tint-sage"><div class="dock-tile-inner"><i class="ph ph-book-open"></i></div></div>
    <div class="dock-tile tint-rose"><div class="dock-tile-inner"><i class="ph ph-heart"></i></div></div>
    <div class="dock-tile tint-sky"><div class="dock-tile-inner"><i class="ph ph-cloud"></i></div></div>
    <div class="dock-tile tint-lavender"><div class="dock-tile-inner"><i class="ph ph-sparkle"></i></div></div>
    <div class="dock-tile ghost"><div class="dock-tile-inner"><i class="ph ph-folder-plus"></i></div></div>
  </nav>
</body>
</html>
