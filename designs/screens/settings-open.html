<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Folio · Settings open</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="screen-base.css">
</head>
<body>
  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <aside class="notes-pane" style="opacity: 0.55;">
    <div class="notes-head"><button class="notes-collapse-btn"><span class="notes-title">Note</span><i class="ph ph-caret-down" style="font-size: 11px;"></i></button></div>
  </aside>
  <aside class="todo-pane" style="opacity: 0.55;">
    <div class="todo-head">
      <button class="todo-collapse-btn"><span class="todo-title">tasks</span><i class="ph ph-caret-down" style="font-size: 11px;"></i></button>
      <button class="add-task-fab"><i class="ph ph-plus"></i> Task</button>
    </div>
  </aside>
  <button class="settings-fab" style="transform: rotate(45deg);" title="Settings"><i class="ph ph-gear-six"></i></button>

  <div class="center-stage" style="opacity: 0.4;">
    <div class="clock">14:32</div>
  </div>

  <nav class="dock" style="opacity: 0.4;">
    <div class="dock-tile tint-gold"><div class="dock-tile-inner"><i class="ph ph-briefcase"></i></div></div>
    <div class="dock-tile tint-sage"><div class="dock-tile-inner"><i class="ph ph-book-open"></i></div></div>
    <div class="dock-tile tint-rose"><div class="dock-tile-inner"><i class="ph ph-heart"></i></div></div>
  </nav>

  <div class="popup-backdrop"></div>

  <div class="floating-form settings-modal">
    <div class="settings-head">
      <span class="settings-title">Settings</span>
      <button class="ghost-btn micro"><i class="ph ph-x" style="font-size: 12px;"></i></button>
    </div>

    <div class="form-section-label">Wallpaper</div>
    <div class="settings-row">
      <button class="btn-ghost">Choose file…</button>
      <button class="btn-ghost">Use default</button>
    </div>
    <div class="settings-hint">JPG, PNG, WebP, or MP4. Min resolution 500×500. Max 50 MB.</div>
    <div class="settings-status" style="font-size: 12px; color: var(--text-soft);">storm-iceland.jpg (2400×1600)</div>

    <div class="form-section-label">Backup</div>
    <div class="settings-row">
      <button class="btn-ghost">Export backup</button>
      <button class="btn-ghost">Import backup</button>
    </div>
    <div class="settings-hint">Bookmarks, folders, tasks, and notes.</div>
    <div class="settings-status"></div>
  </div>
</body>
</html>
