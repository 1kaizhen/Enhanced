<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Folio · Add task</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="screen-base.css">
<style>
  .priority-row { display: flex; gap: 6px; }
  .priority-btn {
    flex: 1; padding: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    color: var(--text-soft);
    font-size: 12px; font-family: inherit;
    border-radius: var(--radius-sm); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .priority-btn.active { background: var(--text); color: #111; border-color: var(--text); }
  .priority-btn .priority-dot { width: 5px; height: 5px; margin: 0; }
  .priority-btn.active .priority-dot.medium { box-shadow: 0 0 0 2px rgba(0,0,0,0.1); }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <aside class="notes-pane" style="opacity: 0.55;">
    <div class="notes-head"><button class="notes-collapse-btn"><span class="notes-title">Note</span><i class="ph ph-caret-down" style="font-size: 11px;"></i></button></div>
  </aside>
  <aside class="todo-pane" style="opacity: 0.55;">
    <div class="todo-head">
      <button class="todo-collapse-btn"><span class="todo-title">tasks</span><i class="ph ph-caret-down" style="font-size: 11px;"></i></button>
      <button class="add-task-fab"><i class="ph ph-plus"></i> Task</button>
    </div>
  </aside>
  <button class="settings-fab" style="opacity: 0.55;" title="Settings"><i class="ph ph-gear-six"></i></button>

  <div class="center-stage" style="opacity: 0.4;">
    <div class="clock">14:32</div>
  </div>

  <nav class="dock" style="opacity: 0.45;">
    <div class="dock-tile tint-gold"><div class="dock-tile-inner"><i class="ph ph-briefcase"></i></div></div>
    <div class="dock-tile tint-sage"><div class="dock-tile-inner"><i class="ph ph-book-open"></i></div></div>
    <div class="dock-tile tint-rose"><div class="dock-tile-inner"><i class="ph ph-heart"></i></div></div>
  </nav>

  <div class="popup-backdrop"></div>

  <!-- Add-task floating form -->
  <div class="floating-form">
    <div class="form-section-label">New task</div>
    <input class="field" type="text" value="Sketch the v2 dock layout">

    <div class="form-section-label">Priority</div>
    <div class="priority-row">
      <button class="priority-btn"><span class="priority-dot low"></span> Low</button>
      <button class="priority-btn active"><span class="priority-dot medium"></span> Med</button>
      <button class="priority-btn"><span class="priority-dot high"></span> High</button>
    </div>

    <div class="form-actions">
      <button class="btn-ghost">Cancel</button>
      <button class="btn-primary">Add</button>
    </div>
  </div>
</body>
</html>
