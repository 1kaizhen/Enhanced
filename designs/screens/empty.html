<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Folio · Empty state</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="screen-base.css">
</head>
<body>
  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <!-- Notes pane (collapsed) — top-left -->
  <aside class="notes-pane">
    <div class="notes-head">
      <button class="notes-collapse-btn">
        <span class="notes-title">Note</span>
        <i class="ph ph-caret-down" style="font-size: 11px;"></i>
      </button>
    </div>
  </aside>

  <!-- Tasks pane (collapsed) — top-right -->
  <aside class="todo-pane">
    <div class="todo-head">
      <button class="todo-collapse-btn">
        <span class="todo-title">tasks</span>
        <i class="ph ph-caret-down" style="font-size: 11px;"></i>
      </button>
      <button class="add-task-fab"><i class="ph ph-plus"></i> Task</button>
    </div>
  </aside>

  <!-- Settings cog — bottom-left -->
  <button class="settings-fab" title="Settings"><i class="ph ph-gear-six"></i></button>

  <!-- Center stage -->
  <div class="center-stage">
    <div class="greeting">Good evening</div>
    <div class="clock">14:32</div>
    <div class="search-wrap">
      <form class="search-bar">
        <button type="button" class="search-engine">
          <i class="ph ph-magnifying-glass" style="font-size: 16px;"></i>
          <i class="ph ph-caret-down caret"></i>
        </button>
        <input class="search-input" placeholder="Search the web…">
        <button type="submit" class="search-go"><i class="ph ph-magnifying-glass" style="font-size: 14px;"></i></button>
      </form>
    </div>
    <div class="quote-block">
      <p class="quote-text">"The journey of a thousand miles begins with a single step."</p>
      <p class="quote-author">— Lao Tzu</p>
    </div>
  </div>

  <!-- Dock (empty — just an add-folder ghost tile) -->
  <nav class="dock">
    <div class="dock-tile ghost"><div class="dock-tile-inner"><i class="ph ph-plus"></i></div></div>
  </nav>
</body>
</html>
